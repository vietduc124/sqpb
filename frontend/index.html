<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="chat-only">
  <div class="chat-widget">
    <header class="widget-header">
      <div class="widget-brand">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <div>
          <h1>Trợ lý AI</h1>
          <p id="statusText">Sẵn sàng trả lời</p>
        </div>
      </div>
      <button class="clear-btn" id="clearBtn" title="Xóa lịch sử">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        </svg>
      </button>
    </header>

    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <p>Xin chào! Tôi có thể giúp gì cho bạn?</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="userInput" placeholder="Nhập câu hỏi..." rows="1" maxlength="2000"></textarea>
        <button class="send-btn" id="sendBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Enter gửi · Shift+Enter xuống dòng</p>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
