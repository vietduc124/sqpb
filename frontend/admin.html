<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Quản lý tài liệu</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="admin-page">
  <div class="admin-layout">
    <header class="admin-header">
      <div class="admin-brand">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <h1>Quản lý tài liệu</h1>
      </div>
      <a href="/" class="back-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Về trang chat
      </a>
    </header>

    <main class="admin-main">
      <!-- Upload zone -->
      <section class="upload-section">
        <label class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" multiple accept=".pdf,.txt,.docx,.doc,.md" hidden />
          <div class="upload-zone-icon">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <polyline points="16 16 12 12 8 16"/>
              <line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
          </div>
          <p class="upload-zone-title">Kéo thả hoặc click để tải lên</p>
          <p class="upload-zone-hint">PDF, DOCX, TXT, MD</p>
        </label>

        <div class="upload-progress" id="uploadProgress" hidden>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <span id="progressText">Đang xử lý...</span>
        </div>

        <div class="upload-toast" id="uploadToast" hidden></div>
      </section>

      <!-- Document list -->
      <section class="docs-section">
        <div class="docs-header">
          <h2>Tài liệu đã tải lên</h2>
          <span class="doc-count" id="docCount">0 tài liệu</span>
        </div>

        <div id="docGrid" class="doc-grid">
          <div class="doc-empty">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <p>Chưa có tài liệu nào</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/admin.js"></script>
</body>
</html>
